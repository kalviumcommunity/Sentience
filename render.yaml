services:
  - type: web
    name: sentience-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: "mongodb+srv://uday:uday@cluster0.n2vzkur.mongodb.net/student-sentience?retryWrites=true&w=majority&appName=Cluster0"
      - key: JWT_SECRET
        value: "your-super-secret-jwt-key-change-this-in-production-2024"
    healthCheckPath: /api/health
    autoDeploy: true 