version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sentience-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sentience-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentience-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017/student-sentience
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key}
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - sentience-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentience-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sentience-network

networks:
  sentience-network:
    driver: bridge

volumes:
  mongodb_data:
